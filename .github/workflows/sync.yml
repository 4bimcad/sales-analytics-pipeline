name: Sync new purchase data

on:
  schedule:
    # Runs every day at 08:00 UTC. Adjust as needed.
    - cron: "0 8 * * *"
  workflow_dispatch: {}  # allows manually triggering the run from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python scripts/sync_data.py

      - name: Commit processed file moves (if any)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/incoming/
          git diff --staged --quiet || git commit -m "Mark synced files as processed"
          git push || echo "Nothing to push"
